function useOrientation(){
  const [land,setLand]=useState(()=>typeof window!=="undefined"&&window.innerWidth>window.innerHeight);
  useEffect(()=>{
    const fn=()=>setLand(window.innerWidth>window.innerHeight);
    window.addEventListener("resize",fn);
    window.addEventListener("orientationchange",()=>setTimeout(fn,150));
    return()=>window.removeEventListener("resize",fn);
  },[]);
  return land;
}

      html,body{height:100%;overflow-x:hidden}
      body{background:#f0f4f8}
      input,textarea{font-family:'Tajawal',sans-serif}
      input:focus,textarea:focus{outline:none;border-color:#f5c842!important;box-shadow:0 0 0 3px #f5c84220}
      button{cursor:pointer;transition:all .15s}
      button:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
      button:active:not(:disabled){transform:scale(0.96) translateY(0)}
      @keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.1)}100%{transform:scale(1)}}
      @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
      @keyframes ptick{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(0.6)}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
      @keyframes confF{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
      @keyframes rankIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
      @keyframes scaleIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
      @keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 8px transparent}}
      .pop{animation:pop .4s ease}
      .float{animation:floatY 4s ease-in-out infinite}
      .modal-in{animation:fadeIn .2s ease}
      .scale-in{animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1) forwards}
      .pt-tick{animation:ptick .9s ease forwards;pointer-events:none;position:fixed;z-index:1000;font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;font-weight:900}
      .blink{animation:blink 1s ease infinite}
      .rank-in{animation:rankIn .35s ease both}
      ::-webkit-scrollbar{width:5px}
      ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    `;
    document.head.appendChild(s);
  },[]);

  useEffect(()=>{
    if(rv?.step==='show'){

        t--; if(t<=0){clearInterval(timer.current);setRv(p=>p?{...p,step:'assign',cd:0}:null);}
        else setRv(p=>p?{...p,cd:t}:null);
      },1000);
      return()=>clearInterval(timer.current);
    }
  },[rv?.idx, rv?.step==='show']);

  const spawnPt=(idx,ti)=>{
    const id=Date.now();
    setPts(p=>[...p,{id,pt:idx+1,color:TC[ti%TC.length],x:30+Math.random()*40}]);
    setTimeout(()=>setPts(p=>p.filter(x=>x.id!==id)),1000);
  };
  const spawnConfetti=()=>{
    setConfetti(Array.from({length:50},(_,i)=>({id:i,x:Math.random()*100,c:TC[Math.floor(Math.random()*TC.length)],sz:5+Math.random()*8,dl:Math.random()*1.5,dr:2+Math.random()*2})));
    setTimeout(()=>setConfetti([]),6000);
  };
  const loadQ=(n)=>{
    const d=QB[parseInt(n)-1];
    if(d){setQ(d.q);const a=Array(10).fill("");d.a.forEach((x,i)=>{if(i<10)a[i]=x;});setAi(a);}
  };
  const startPlay=()=>{setAns(ai.map(t=>({text:t.trim(),revealed:false,team:null})));setRv(null);setQc(c=>c+1);setPhase("playing");};
  const pressAnswer=(idx)=>{if(ans[idx]?.revealed||rv)return;clearInterval(timer.current);setRv({idx,step:'show',cd:5});};
  const assignTeam=(ti)=>{
    const idx=rv.idx; clearInterval(timer.current);
    setAns(p=>p.map((a,i)=>i===idx?{...a,revealed:true,team:ti}:a));
    setScores(p=>p.map((s,i)=>i===ti?s+(idx+1):s));
    setRv(null); spawnPt(idx,ti);
  };
  const nextQ=()=>{clearInterval(timer.current);setQ("");setAi(Array(10).fill(""));setAns([]);setRv(null);setQnum("");setShowAns(false);setPhase("question-entry");};
  const endGame=()=>{clearInterval(timer.current);spawnConfetti();setPhase("results");};
  const newGame=()=>{clearInterval(timer.current);setScores(Array(8).fill(0));setAns([]);setQ("");setAi(Array(10).fill(""));setQc(0);setRv(null);setQnum("");setShowAns(false);setPhase("setup");};

  const sorted=[...names.slice(0,tc).map((n,i)=>({n,s:scores[i],i,c:TC[i%TC.length]}))].sort((a,b)=>b.s-a.s);

  // ─── LOGO ───
  const Logo=({xl})=>(
    <img src={LOGO_MAIN} alt="TOP 10 في وهاج" style={{
      height: xl ? (land?280:260) : land?54:42,
      width:"auto", objectFit:"contain", display:"block",
      margin:"0 auto",
      filter:"drop-shadow(0 4px 16px rgba(0,0,0,0.6))",
    }}/>
  );

  const ScoresRow=()=>(
    <div style={{display:"flex",gap:land?10:6,justifyContent:"center",flexWrap:"nowrap",overflowX:"auto",padding:"6px 12px 8px",WebkitOverflowScrolling:"touch"}}>
      {names.slice(0,tc).map((n,i)=>(
        <div key={i} style={{
          background:"#fff",
          border:`3px solid ${TC[i%TC.length]}`,
          borderRadius:12,padding:land?"8px 16px":"6px 10px",
          textAlign:"center",flex:"0 0 auto",
          minWidth:land?100:78,
          boxShadow:`0 2px 8px ${TC[i%TC.length]}30`,
        }}>
          <div style={{color:TC[i%TC.length],fontSize:land?11:9,fontWeight:800,fontFamily:"'Tajawal',sans-serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:land?88:66}}>{n}</div>
          <div style={{color:"#f5c842",fontWeight:900,fontSize:land?30:22,lineHeight:1,fontFamily:"'Bebas Neue',sans-serif"}}>{scores[i]}</div>

        <div style={{maxWidth:land?640:560,margin:"0 auto",padding:"0 12px"}}>

            <span style={{color:qnum&&parseInt(qnum)>=1&&parseInt(qnum)<=13?"#4ade80":"#2a4a6a",fontSize:11,fontFamily:"'Tajawal',sans-serif",flex:1}}>

  /* ══ PLAYING ══ */
  if(phase==="playing"){

    // landscape: everything fits in 100vh no scroll

      <div style={{...S.pg,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {pts.map(p=>(<div key={p.id} className="pt-tick" style={{left:`${p.x}%`,top:"30%",color:p.color,textShadow:`0 2px 8px ${p.color}80`}}>+{p.pt}</div>))}

        {/* Header - logo center, badges + action buttons on sides */}
        <div style={{padding:land?"4px 16px":"6px 12px",background:"#0a1628",borderBottom:"1px solid #1e3a5f",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:8}}>
          {/* Left: action buttons */}
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <button onClick={nextQ} style={{background:"linear-gradient(135deg,#c9a227,#f5c842)",color:"#1a1000",border:"none",borderRadius:8,padding:land?"5px 12px":"4px 10px",fontSize:land?12:11,fontWeight:800,fontFamily:"'Tajawal',sans-serif",whiteSpace:"nowrap"}}>➕ سؤال</button>
            <button onClick={endGame} style={{background:"#1a1400",color:"#f5c842",border:"1px solid #f5c84240",borderRadius:8,padding:land?"5px 12px":"4px 10px",fontSize:land?12:11,fontWeight:800,fontFamily:"'Tajawal',sans-serif",whiteSpace:"nowrap"}}>🏆 إنهاء</button>
          </div>

            <span style={{background:"#0a1e14",border:"1px solid #16a34a50",borderRadius:20,padding:"2px 8px",color:"#4ade80",fontSize:10,fontFamily:"'Tajawal',sans-serif",fontWeight:700}}>{done}/{tot} ✓</span>

                <div key={i} style={{background:"#112240",border:`2px solid ${TC[i%TC.length]}`,borderRadius:8,padding:"3px 10px",textAlign:"center",flex:"1 1 0",minWidth:0,boxShadow:`0 1px 4px ${TC[i%TC.length]}35`}}>
                  <div style={{color:TC[i%TC.length],fontSize:8,fontWeight:800,fontFamily:"'Tajawal',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n}</div>
                  <div style={{color:"#f5c842",fontWeight:900,fontSize:18,lineHeight:1,fontFamily:"'Bebas Neue',sans-serif"}}>{scores[i]}</div>

                    className={isAct&&rv?.step==="show"?"pop":""}

        {rv?.step==='show'&&(
          <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,backdropFilter:"blur(4px)"}}>
            <div className="modal-in scale-in" style={{background:"#0a1628",border:`4px solid ${CC[rv.idx%CC.length]}`,borderRadius:24,padding:land?"36px 44px":"26px 24px",textAlign:"center",maxWidth:land?420:300,width:"90%",boxShadow:`0 20px 60px ${CC[rv.idx%CC.length]}40`}}>
              <div style={{color:CC[rv.idx%CC.length],fontSize:11,fontWeight:800,letterSpacing:3,marginBottom:8,fontFamily:"'Tajawal',sans-serif"}}>الإجابة رقم</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:land?110:88,lineHeight:0.85,letterSpacing:4,color:CC[rv.idx%CC.length],textShadow:`0 0 30px ${CC[rv.idx%CC.length]}80`}}>{rv.idx+1}</div>
              <div style={{color:"#f1f5f9",fontSize:land?32:24,fontWeight:900,margin:"12px 0 4px",fontFamily:"'Tajawal',sans-serif",lineHeight:1.3}}>{ans[rv.idx]?.text}</div>
              <div style={{color:CC[rv.idx%CC.length],fontSize:land?17:14,fontWeight:800,marginBottom:18,fontFamily:"'Tajawal',sans-serif"}}>+{rv.idx+1} نقطة</div>
              <div style={{position:"relative",width:land?72:58,height:land?72:58,margin:"0 auto"}}>
                <svg width={land?72:58} height={land?72:58} style={{transform:"rotate(-90deg)"}}>
                  <circle cx={land?36:29} cy={land?36:29} r={land?29:24} fill="none" stroke="#e2e8f0" strokeWidth="5"/>
                  <circle cx={land?36:29} cy={land?36:29} r={land?29:24} fill="none" stroke={CC[rv.idx%CC.length]} strokeWidth="5" strokeDasharray={land?182:150} strokeLinecap="round" strokeDashoffset={(land?182:150)*(1-rv.cd/5)} style={{transition:"stroke-dashoffset 0.95s linear"}}/>
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#f1f5f9",fontWeight:900,fontSize:land?24:20,fontFamily:"'Bebas Neue',sans-serif"}}>{rv.cd}</div>
              </div>
            </div>
          </div>
        )}

        {/* ASSIGN overlay step 2 */}
        {rv?.step==='assign'&&(
          <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,backdropFilter:"blur(8px)"}}>
            <div className="modal-in" style={{background:"#0d1f38",border:"1px solid #1e3a5f",borderRadius:22,padding:land?"28px 32px":"20px 16px",textAlign:"center",maxWidth:land?580:430,width:"95%",boxShadow:"0 24px 60px rgba(0,0,0,0.5)"}}>
              <div style={{color:"#94a3b8",fontSize:12,fontFamily:"'Tajawal',sans-serif",marginBottom:4}}>تضاف لمن؟</div>
              <div style={{color:"#f1f5f9",fontSize:land?22:17,fontWeight:800,fontFamily:"'Tajawal',sans-serif",marginBottom:4}}>{ans[rv.idx]?.text}</div>
              <div style={{color:CC[rv.idx%CC.length],fontSize:13,fontWeight:700,fontFamily:"'Tajawal',sans-serif",marginBottom:18}}>+{rv.idx+1} نقطة</div>
              <div style={{display:"grid",gridTemplateColumns:land?`repeat(${tc<=4?tc:4},1fr)`:tc<=4?"1fr 1fr":"1fr 1fr 1fr 1fr",gap:8,marginBottom:12}}>
                {names.slice(0,tc).map((n,ti)=>(
                  <button key={ti} onClick={()=>assignTeam(ti)} style={{background:TC[ti%TC.length],border:"none",borderRadius:12,padding:land?"14px 8px":"11px 6px",color:"#fff",fontWeight:800,fontSize:land?14:12,fontFamily:"'Tajawal',sans-serif",boxShadow:`0 4px 14px ${TC[ti%TC.length]}60`,lineHeight:1.4}}>
                    <div style={{fontSize:9,opacity:0.8,marginBottom:3}}>{scores[ti]} نقطة</div>
                    {n}
                  </button>
                ))}
              </div>
              <button onClick={()=>setRv(null)} style={{background:"none",border:"none",color:"#2a4a6a",fontFamily:"'Tajawal',sans-serif",fontSize:12}}>إلغاء</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ══ RESULTS ══ */
  if(phase==="results"){
    const medals=["🥇","🥈","🥉"];
    return(
      <div style={{...S.pg,minHeight:"100vh",paddingBottom:24}}>
        {confetti.map(c=>(<div key={c.id} style={{position:"fixed",left:`${c.x}%`,top:-16,width:c.sz,height:c.sz,borderRadius:3,background:c.c,zIndex:999,pointerEvents:"none",animation:`confF ${c.dr}s ${c.dl}s ease forwards`}}/>))}
        <div style={{textAlign:"center",padding:land?"14px 24px":"22px 16px 14px",background:"#0a1628",borderBottom:"1px solid #1e3a5f",marginBottom:16}}>
          <Logo/>
          <div style={{color:"#f5c842",fontFamily:"'Tajawal',sans-serif",fontSize:12,marginTop:4,letterSpacing:3,fontWeight:700}}>🏆 النتائج النهائية 🏆</div>
        </div>
        <div style={{maxWidth:land?900:480,margin:"0 auto",padding:"0 14px",display:land?"flex":"block",gap:24,alignItems:"flex-start"}}>
          {sorted.length>=3&&(
            <div style={{flex:land?"0 0 300px":undefined,marginBottom:land?0:20}}>
              <div style={{color:"#2a4a6a",fontSize:10,letterSpacing:2,fontFamily:"'Tajawal',sans-serif",textAlign:"center",marginBottom:12,fontWeight:700}}>المنصة</div>
              <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:8}}>
                {[sorted[1],sorted[0],sorted[2]].map((item,pi)=>{
                  const hs=["110px","150px","88px"]; const rk=[2,1,3];
                  return(
                    <div key={item.i} style={{flex:1,maxWidth:92,textAlign:"center"}}>
                      <div style={{fontSize:24,marginBottom:3}}>{medals[rk[pi]-1]}</div>
                      <div style={{color:"#1e293b",fontWeight:800,fontSize:10,fontFamily:"'Tajawal',sans-serif",marginBottom:4,lineHeight:1.3}}>{item.n}</div>
                      <div style={{background:item.c,borderRadius:"8px 8px 0 0",height:hs[pi],display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${item.c}60`}}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#fff",letterSpacing:1}}>{item.s}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <div style={{flex:1}}>
            <div style={{color:"#2a4a6a",fontSize:10,letterSpacing:2,fontFamily:"'Tajawal',sans-serif",textAlign:"center",marginBottom:10,fontWeight:700}}>الترتيب الكامل</div>
            {sorted.map((item,rank)=>(
              <div key={item.i} className="rank-in" style={{background:rank===0?"#112240":"#0d1f38",border:`2px solid ${rank<3?item.c:"#1e3a5f"}`,borderRadius:12,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10,boxShadow:rank===0?`0 4px 16px ${item.c}40`:"0 1px 4px rgba(0,0,0,0.2)",animationDelay:`${rank*0.06}s`,opacity:0}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:rank<3?item.c:"#cbd5e1",width:22,textAlign:"center"}}>{rank+1}</div>
                <div style={{width:10,height:32,borderRadius:4,background:item.c,flexShrink:0}}/>
                <div style={{flex:1,color:"#e2e8f0",fontWeight:800,fontSize:14,fontFamily:"'Tajawal',sans-serif"}}>{item.n}</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:item.c,letterSpacing:1}}>{item.s}</div>
                {rank===0&&<span style={{fontSize:16}}>👑</span>}
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={()=>setPhase("question-entry")} style={{...S.btnG,background:"#112240",color:"#7ea8c9",border:"1px solid #1e3a5f"}}>◄ متابعة اللعبة</button>
              <button onClick={newGame} style={S.btnMain}>🔄 لعبة جديدة</button>
            </div>
          </div>
        </div>
        <div style={S.footer}><img src={BANK} style={{height:14,opacity:0.35}} alt=""/><span>برعاية مصرف وهاج المركزي</span></div>
      </div>
    );
  }
  return null;
}

const S={
  pg:{minHeight:"100vh",background:"linear-gradient(160deg,#0a1628 0%,#0d2040 40%,#0a1628 100%)",fontFamily:"'Tajawal',sans-serif",direction:"rtl"},
  card:{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"14px",marginBottom:10,boxShadow:"0 1px 6px rgba(0,0,0,0.04)"},
  lbl:{color:"#f5c842",fontSize:11,fontWeight:800,marginBottom:8,letterSpacing:1},
  inp:{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:8,padding:"9px 11px",color:"#e2e8f0",fontSize:14,width:"100%",direction:"rtl",transition:"all .2s"},
  btnMain:{background:"linear-gradient(135deg,#c9a227,#f5c842)",color:"#1a1000",border:"none",borderRadius:12,padding:"13px 22px",fontSize:15,fontWeight:800,fontFamily:"'Tajawal',sans-serif",boxShadow:"0 4px 20px #f5c84240"},
  btnG:{background:"#112240",color:"#7ea8c9",border:"1px solid #1e3a5f",borderRadius:10,padding:"9px 14px",fontSize:13,fontWeight:700,fontFamily:"'Tajawal',sans-serif",display:"inline-flex",alignItems:"center",gap:5,boxShadow:"0 1px 4px rgba(0,0,0,0.2)"},
  footer:{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"10px 16px",borderTop:"1px solid #e2e8f0",marginTop:8,color:"#1e3a5f",fontSize:10,fontFamily:"'Tajawal',sans-serif"},
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
